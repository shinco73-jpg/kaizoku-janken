<!--
  海賊じゃんけん 対人対戦（クライアント）
  - server.py（FastAPI）に WebSocket でつないで、友達と2人対戦します。
  - 進行と判定はサーバー側。この画面は「表示」と「操作を送る」役です。
-->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>海賊じゃんけん 対戦</title>
<style>
  :root{
    --sea-deep:#0a1a24; --sea:#12303d; --sea-line:#1c4a5a;
    --brass:#d4a24e; --brass-light:#ecc981;
    --parchment:#efe0bd; --parchment-dark:#d9c496;
    --ink:#2a2016; --foam:#f3ede0;
    --danger:#c04a3b; --win:#7fbf7f; --star:#f2c14e;
    --you:#2f6d86; --cpu:#a8496a;
    --font-display:"Hiragino Mincho ProN","Yu Mincho","YuMincho","MS PMincho",serif;
    --font-body:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font-body);color:var(--foam);min-height:100vh;min-height:100dvh;overflow-x:hidden;
    -webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent;
    background:radial-gradient(1200px 600px at 50% -10%, #1a4657 0%, transparent 60%),
      repeating-linear-gradient(180deg, transparent 0 38px, rgba(255,255,255,.015) 38px 39px), var(--sea-deep);
    display:flex;justify-content:center;
    padding:max(16px,env(safe-area-inset-top)) max(14px,env(safe-area-inset-right)) max(28px,env(safe-area-inset-bottom)) max(14px,env(safe-area-inset-left))}
  .board{width:100%;max-width:640px}
  header{text-align:center;margin-bottom:12px}
  .compass{font-size:26px;color:var(--brass);opacity:.85}
  h1{font-family:var(--font-display);font-size:clamp(28px,7vw,46px);letter-spacing:.14em;
     color:var(--brass-light);text-shadow:0 2px 0 rgba(0,0,0,.4),0 0 26px rgba(212,162,78,.28);margin:2px 0}
  .subtitle{font-size:11px;letter-spacing:.4em;color:var(--parchment-dark);text-transform:uppercase;opacity:.7}

  /* ── ロビー ── */
  .lobby-card{max-width:360px;margin:14px auto 0;background:linear-gradient(180deg,#153a49,#0e2833);
    border:1px solid var(--sea-line);border-radius:14px;padding:20px 18px;text-align:center}
  .lobby-card label{display:block;font-size:12px;color:var(--parchment-dark);letter-spacing:.1em;margin:10px 0 4px;text-align:left}
  .lobby-card input{width:100%;padding:12px 12px;border-radius:9px;border:1px solid var(--sea-line);
    background:#0c222c;color:var(--foam);font-size:16px;font-family:var(--font-body)}
  .lobby-card .row{display:flex;gap:8px;align-items:flex-end;margin-top:6px}
  .lobby-card .row input{flex:1}
  .lobby-card .or{font-size:11px;color:var(--parchment-dark);margin:16px 0 2px;letter-spacing:.2em}
  .lobby-err{color:#ffb0a4;font-size:12px;margin-top:12px;min-height:16px}
  .btn{font-family:var(--font-body);font-size:14px;letter-spacing:.06em;border:none;border-radius:10px;
    padding:11px 20px;cursor:pointer;font-weight:700;white-space:nowrap;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
  .btn.primary{color:var(--sea-deep);background:linear-gradient(180deg,var(--brass-light),var(--brass));box-shadow:0 4px 0 #a67c2f}
  .btn.ghost{color:var(--parchment);background:#1c3a47;border:1px solid var(--sea-line);box-shadow:0 4px 0 #0e2530}
  .btn.surrender{color:#ffd8cf;background:#5c2b2b;border:1px solid #8f4a44;box-shadow:0 4px 0 #3a1b1b}
  .btn:active{transform:translateY(2px)}
  .btn.wide{width:100%}

  /* ── タイマー ── */
  .timer{margin:12px auto 6px;max-width:340px;text-align:center;background:linear-gradient(180deg,#153a49,#0e2833);
    border:1px solid var(--sea-line);border-radius:999px;padding:8px 18px;font-size:15px;letter-spacing:.08em;color:var(--parchment)}
  .timer b{font-family:var(--font-display);font-size:24px;color:var(--brass-light);margin:0 4px}
  .timer.warn b{color:var(--danger)}
  .timer.hidden{display:none}

  /* ── 対戦エリア ── */
  .arena{position:relative;margin:10px 0;min-height:150px;
    background:radial-gradient(400px 200px at 50% 40%, rgba(212,162,78,.06), transparent 70%),linear-gradient(180deg,#0e2b37,#0a212b);
    border:1px solid var(--sea-line);border-radius:14px;padding:18px 14px;
    display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px}
  .arena.stage{align-items:end;background:transparent;overflow:hidden}
  svg.tavern-bg{position:absolute;inset:0;width:100%;height:100%;border-radius:14px;z-index:0}
  .fighter{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:2px}
  .fighter .cap{font-size:11px;letter-spacing:.03em;color:var(--foam);font-weight:700;margin-bottom:3px;
    max-width:104px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    background:rgba(20,14,6,.62);border:1px solid var(--brass);border-radius:999px;padding:2px 11px;box-shadow:0 2px 4px rgba(0,0,0,.45)}
  .fighter.you .cap{border-color:#5aa6c4}
  .fighter.opp .cap{border-color:#d98cae}
  .hand-anim{font-size:33px;line-height:1;filter:drop-shadow(0 4px 6px rgba(0,0,0,.4));transition:filter .2s}
  .hand-anim.shaking{animation:bob .3s ease-in-out infinite}
  .hand-anim.pop{animation:pop .32s ease}
  .hand-anim.star-glow{filter:drop-shadow(0 0 7px var(--star)) drop-shadow(0 0 13px var(--star))}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-8deg)}50%{transform:translateY(-11px) rotate(8deg)}}
  @keyframes pop{0%{transform:scale(.55)}55%{transform:scale(1.25)}100%{transform:scale(1)}}
  .avatar svg.pirate{width:58px;height:auto;display:block}
  svg.mat{width:74px;height:auto;display:block;margin-top:-3px;filter:drop-shadow(0 3px 4px rgba(0,0,0,.4))}
  .verdict-slot{position:relative;z-index:1;min-width:64px;text-align:center;align-self:center}
  .verdict-slot .prompt{font-size:12px;color:#40260f;font-weight:700;line-height:1.45;text-shadow:0 1px 0 rgba(255,255,255,.25)}
  .spark{position:absolute;font-size:15px;color:var(--star);animation:sparkle .8s ease forwards;pointer-events:none;z-index:2}
  @keyframes sparkle{0%{transform:scale(0) rotate(0);opacity:0}30%{opacity:1}100%{transform:scale(1.5) rotate(140deg);opacity:0}}
  .count-num{font-family:var(--font-display);font-weight:800;font-size:clamp(30px,9vw,46px);color:var(--brass-light);text-shadow:0 2px 0 rgba(0,0,0,.4);animation:countpop .48s ease}
  @keyframes countpop{0%{transform:scale(.4);opacity:0}45%{transform:scale(1.18);opacity:1}100%{transform:scale(1);opacity:.95}}
  .result-pop{position:relative;z-index:2;font-family:var(--font-display);font-weight:800;font-size:clamp(24px,7vw,36px);text-shadow:0 2px 0 rgba(0,0,0,.35);animation:popin .5s cubic-bezier(.2,1.5,.4,1)}
  .result-pop.win{color:#8ff0a0} .result-pop.lose{color:#ff8f7a} .result-pop.draw{color:#f0e0b0}
  @keyframes popin{0%{transform:scale(0) rotate(-14deg);opacity:0}55%{transform:scale(1.28) rotate(7deg)}100%{transform:scale(1) rotate(0);opacity:1}}
  .confetti{position:absolute;top:-14px;border-radius:1px;z-index:3;animation:fall linear forwards;pointer-events:none}
  @keyframes fall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(210px) rotate(540deg);opacity:.15}}
  .round-banner{grid-column:1/-1;align-self:center;text-align:center;position:relative;z-index:2;
    font-family:var(--font-display);font-weight:800;font-size:clamp(30px,9vw,50px);letter-spacing:.05em;color:#fff;
    text-shadow:0 3px 0 rgba(0,0,0,.45),0 0 18px rgba(212,162,78,.5);animation:bannerpop .9s ease forwards}
  .round-banner.round{color:#ffe6a6} .round-banner.start{color:#a6f0b0}
  @keyframes bannerpop{0%{transform:scale(.4) rotate(-6deg);opacity:0}20%{transform:scale(1.12) rotate(2deg);opacity:1}75%{transform:scale(1) rotate(0);opacity:1}100%{transform:scale(1.06);opacity:0}}
  .pick-card{min-height:0;opacity:0}
  .pick-card.show{opacity:1;animation:cardpop .4s cubic-bezier(.2,1.5,.4,1)}
  .pick-card .box{display:inline-flex;flex-direction:column;align-items:center;gap:1px;position:relative;
    background:linear-gradient(180deg,#2c2016,#19110a);border:1px solid #b89b5e;border-radius:7px;padding:3px 9px;box-shadow:0 3px 6px rgba(0,0,0,.4)}
  .pick-card .box .e{font-size:17px;line-height:1}
  .pick-card .box .n{font-size:9px;color:var(--parchment);letter-spacing:.04em}
  .pick-card .box .st{position:absolute;top:-6px;right:-5px;color:var(--star);font-size:11px}
  @keyframes cardpop{0%{transform:translateY(6px) scale(.6);opacity:0}60%{transform:translateY(0) scale(1.15)}100%{transform:scale(1);opacity:1}}

  /* 待機・準備 */
  .wait-box{grid-column:1/-1;align-self:center;text-align:center;position:relative;z-index:1;color:#40260f}
  .wait-title{font-family:var(--font-display);font-size:20px;font-weight:800}
  .wait-code{margin-top:8px;font-size:14px}
  .wait-code b{font-family:var(--font-display);font-size:26px;color:#7a2f22;letter-spacing:.15em;background:#f0e0bd;padding:2px 12px;border-radius:8px;border:1px solid #b89b5e}
  .wait-hint{margin-top:8px;font-size:11px;color:#5a3a1e}
  .ready-screen{grid-column:1/-1;text-align:center;position:relative;z-index:1;align-self:center;padding:6px 0}
  .rules-card{max-width:330px;margin:0 auto;background:linear-gradient(180deg,#123240,#0d2530);border:1px solid var(--sea-line);border-radius:12px;padding:14px 16px}
  .rules-card .rt{font-family:var(--font-display);font-size:17px;color:var(--brass-light);margin-bottom:8px;letter-spacing:.1em}
  .rules-card ul{list-style:none;text-align:left;font-size:12px;line-height:1.7;color:var(--parchment);margin:0 auto 12px;max-width:260px}
  .rules-card li::before{content:"\2693 ";color:var(--brass)}
  .ready-row{display:flex;gap:8px;justify-content:center;margin-bottom:12px;flex-wrap:wrap}
  .ready-badge{font-size:11px;padding:4px 9px;border-radius:6px;border:1px solid}
  .ready-badge.wait{color:var(--parchment-dark);border-color:var(--sea-line);background:rgba(255,255,255,.03)}
  .ready-badge.ok{color:#bfe6c0;border-color:#4f8a54;background:rgba(80,150,90,.16)}
  .waiting-small{font-size:12px;color:var(--parchment-dark)}

  /* ── 手札 ── */
  .tray-label{font-size:12px;letter-spacing:.12em;color:var(--parchment-dark);text-align:center;font-weight:700;margin:8px 2px 6px}
  .tray-label.you{color:#8fc3d8} .tray-label.opp{color:#e2a0b8}
  .duel{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:12px 0}
  .hand-tray{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
  .card{position:relative;cursor:pointer;background:linear-gradient(180deg,var(--parchment),var(--parchment-dark));color:var(--ink);
    border:2px solid #b89b5e;border-radius:10px;padding:9px 2px 7px;text-align:center;
    box-shadow:0 4px 0 #9c8248,0 8px 14px rgba(0,0,0,.35);transition:transform .12s ease,box-shadow .12s ease;user-select:none;touch-action:manipulation;-webkit-touch-callout:none;-webkit-tap-highlight-color:transparent}
  .card:hover:not(.used):not(.cpu){transform:translateY(-3px)}
  .card .emoji{font-size:25px;line-height:1;display:block}
  .card .name{font-size:10px;margin-top:2px;font-weight:700;letter-spacing:.04em}
  .card .star{position:absolute;top:3px;right:4px;color:#c9911f;font-size:12px;text-shadow:0 1px 0 rgba(255,255,255,.5)}
  .card.used{cursor:default;filter:grayscale(.7) brightness(.82)}
  .card.used::after{content:"使用済み";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    background:rgba(20,14,6,.55);color:var(--foam);font-size:10px;letter-spacing:.15em;border-radius:8px}
  .card.cpu{background:linear-gradient(180deg,#2c4a58,#1b3540);color:var(--foam);border-color:#3c6376;box-shadow:0 4px 0 #12252d,0 8px 14px rgba(0,0,0,.35);cursor:default}
  .card.cpu .name{color:var(--parchment-dark)}
  .card.cpu .star{color:var(--star);text-shadow:0 1px 2px rgba(0,0,0,.5)}

  /* ── パネル ── */
  .panels{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
  .panel{border-radius:12px;padding:11px 13px;border:1px solid rgba(255,255,255,.12)}
  .panel.you{background:linear-gradient(180deg,rgba(47,109,134,.35),rgba(20,48,61,.5));border-color:var(--you)}
  .panel.opp{background:linear-gradient(180deg,rgba(168,73,106,.32),rgba(45,20,33,.5));border-color:var(--cpu)}
  .panel .who{font-size:11px;letter-spacing:.15em;color:var(--parchment-dark)}
  .panel .pname{font-weight:700;font-size:14px;margin:1px 0 4px}
  .panel .title-tag{font-family:var(--font-display);font-size:15px;color:var(--brass-light)}
  .star-line{min-height:18px;font-size:15px;color:var(--star);letter-spacing:1px;margin:2px 0;text-shadow:0 1px 1px rgba(0,0,0,.4)}
  .star-line .starzero{color:var(--parchment-dark);font-size:12px}
  .star-line .starcount{color:var(--parchment-dark);font-size:11px}
  .panel .record{font-size:13px;margin-top:5px}
  .panel .record .crown{color:var(--star)}
  .panel .strength{font-size:12px;color:var(--parchment-dark);margin-top:2px}
  .panel .strength .num{color:var(--foam);font-weight:700}
  .panel .delta{font-size:11px;margin-left:4px}
  .panel .delta.up{color:var(--win)} .panel .delta.down{color:var(--danger)}

  .banner{text-align:center;margin:16px 0 4px;min-height:26px;font-family:var(--font-display);font-size:19px;color:var(--brass-light)}
  .actions{text-align:center;margin-top:12px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .note{margin-top:16px;font-size:11px;color:#7f93a0;line-height:1.6;text-align:center}
  .hidden{display:none}
  @media(max-width:430px){
    h1{font-size:34px}
    .board{max-width:100%}
    .duel{gap:8px}
    .hand-tray{gap:5px}
    .card{padding:11px 2px 9px}
    .card .emoji{font-size:26px}
    .panels{gap:8px}
    .panel{padding:10px 11px}
    .btn{padding:13px 20px}
    .arena{min-height:158px}
    .lobby-card{padding:18px 16px}
  }
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>

<div class="board">
  <header>
    <div class="compass">&#10022;</div>
    <h1>海賊じゃんけん</h1>
    <div class="subtitle">Pirate Janken &mdash; 対戦</div>
  </header>

  <!-- ロビー -->
  <div id="lobby">
    <div class="lobby-card">
      <label>ニックネーム</label>
      <input id="name" maxlength="12" placeholder="なまえ">
      <button class="btn primary wide" id="create" style="margin-top:14px">新しい部屋を作る</button>
      <div class="or">― または ―</div>
      <label>部屋コードで参加</label>
      <div class="row">
        <input id="code" maxlength="4" placeholder="ABCD" style="text-transform:uppercase">
        <button class="btn ghost" id="join">参加する</button>
      </div>
      <div class="lobby-err" id="lobby-err"></div>
    </div>
  </div>

  <!-- ゲーム -->
  <div id="game" class="hidden">
    <div class="timer hidden" id="timer">アクションまで <b id="time-left">20</b> 秒</div>

    <div class="arena stage" id="arena"></div>

    <div class="duel">
      <div>
        <div class="tray-label you" id="you-label">あなた</div>
        <div class="hand-tray" id="you-tray"></div>
      </div>
      <div>
        <div class="tray-label opp" id="opp-label">相手</div>
        <div class="hand-tray" id="opp-tray"></div>
      </div>
    </div>

    <div class="panels">
      <div class="panel you">
        <div class="who">あなた</div>
        <div class="pname" id="you-name">あなた</div>
        <div><span class="title-tag" id="you-title">見習い</span></div>
        <div class="star-line" id="you-star"></div>
        <div class="record"><span class="crown">&#128081;</span> <span id="you-rec">0勝0敗</span></div>
        <div class="strength">強さ：<span class="num" id="you-str">1500</span><span class="delta" id="you-delta"></span></div>
      </div>
      <div class="panel opp">
        <div class="who">相手</div>
        <div class="pname" id="opp-name">―</div>
        <div><span class="title-tag" id="opp-title">―</span></div>
        <div class="star-line" id="opp-star"></div>
        <div class="record"><span class="crown">&#128081;</span> <span id="opp-rec">0勝0敗</span></div>
        <div class="strength">強さ：<span class="num" id="opp-str">1500</span><span class="delta" id="opp-delta"></span></div>
      </div>
    </div>

    <div class="banner" id="banner"></div>
    <div class="actions" id="actions"></div>
    <div class="note">勝敗は★の合計が多いほうの勝ち（ノーマル勝ち+1／★でノーマル勝ち+2／★同士勝ち+3・負けても減らない）。強さは勝ち+16・負け-16・引き分け±0。</div>
  </div>
</div>

<script>
const HANDS = { goo:{name:"グー",emoji:"\u270A"}, choki:{name:"チョキ",emoji:"\u270C\uFE0F"}, paa:{name:"パー",emoji:"\u270B"} };
const TITLE_BANDS = [
  {min:2000,name:"海賊王"},{min:1900,name:"大海賊"},{min:1800,name:"賞金首"},
  {min:1700,name:"船長"},{min:1620,name:"幹部"},{min:1560,name:"一等航海士"},
  {min:1500,name:"航海士"},{min:1450,name:"船漕ぎ"},{min:1400,name:"新入り"},
  {min:1330,name:"下っ端"},{min:0,name:"床磨き"},
];
function titleFor(str,games){ if(games<3) return "見習い"; for(const b of TITLE_BANDS){ if(str>=b.min) return b.name; } return "床磨き"; }
function starIcons(n){
  if(n<=0) return '<span class="starzero">\u2605 0</span>';
  const cap=Math.min(n,10);
  return '\u2605'.repeat(cap)+(n>10?'<span class="starcount"> \u00d7'+n+'</span>':'');
}
const el = id => document.getElementById(id);

/* ===== 接続 ===== */
let ws=null, S=null, myIndex=0, myCode="", localPicked=false, pickTimer=null;
function send(o){ if(ws && ws.readyState===1) ws.send(JSON.stringify(o)); }
function connect(name, code){
  const proto = location.protocol==="https:" ? "wss" : "ws";
  ws = new WebSocket(proto+"://"+location.host+"/ws");
  ws.onopen = ()=> send({t:"join", name:name, room:code});
  ws.onmessage = e=> handle(JSON.parse(e.data));
  ws.onclose = ()=>{ if(!el("game").classList.contains("hidden")){ el("banner").textContent="接続が切れました。再読み込みしてください。"; } };
  ws.onerror = ()=> el("lobby-err").textContent="サーバーに接続できませんでした。";
}
el("create").onclick = ()=> connect(el("name").value, "");
el("join").onclick   = ()=>{ const c=el("code").value.trim(); if(!c){ el("lobby-err").textContent="部屋コードを入れてね"; return; } connect(el("name").value, c); };

/* ===== メッセージ処理 ===== */
function handle(m){
  if(m.t==="joined"){ myIndex=m.you; myCode=m.code; el("lobby").classList.add("hidden"); el("game").classList.remove("hidden"); }
  else if(m.t==="error"){ el("lobby-err").textContent=m.msg; if(ws) ws.close(); }
  else if(m.t==="state"){ S=m; onState(); }
  else if(m.t==="round_start"){ onRoundStart(m.round, m.first); }
  else if(m.t==="you_picked"){ localPicked=true; renderTrays(); const pr=document.querySelector(".prompt"); if(pr) pr.innerHTML="相手を待っています…"; }
  else if(m.t==="opp_picked"){ const pr=document.querySelector(".prompt"); if(pr && !localPicked) pr.innerHTML="相手は出したよ！<br>早く選ぼう"; }
  else if(m.t==="reveal"){ stopPickTimer(); showTimer(false); animateRound(m.you, m.opp, m.result, ()=> send({t:"ready_next"})); }
  else if(m.t==="game_over"){ onGameOver(m); }
  else if(m.t==="opp_left"){ el("banner").textContent="相手が退出しました"; }
}

function onState(){
  if(!S) return;
  renderPanels(); renderTrays();
  const a=el("actions");
  if(S.phase==="lobby"){ showWaiting(); a.innerHTML=""; }
  else if(S.phase==="ready"){ showReadyScreen(); a.innerHTML=""; }
  else if(S.phase==="playing" || S.phase==="reveal"){
    a.innerHTML='<button class="btn surrender" id="give-up">\uD83C\uDFF3\uFE0F 降参する</button>';
    el("give-up").onclick=()=>send({t:"surrender"});
  }
  el("you-label").textContent = S.you.name;
  el("opp-label").textContent = S.opp ? S.opp.name : "相手";
}

/* ===== 画面 ===== */
function showTimer(on){ el("timer").classList.toggle("hidden", !on); }
function setTimeLeft(n){ el("time-left").textContent=Math.max(0,n); el("timer").classList.toggle("warn", n<=5); }
function startPickTimer(){
  stopPickTimer(); let left=20; setTimeLeft(left); showTimer(true);
  pickTimer=setInterval(()=>{ left--; setTimeLeft(left); if(left<=0) stopPickTimer(); },1000);
}
function stopPickTimer(){ if(pickTimer){ clearInterval(pickTimer); pickTimer=null; } }

function showWaiting(){
  const arena=el("arena"); arena.className="arena stage";
  arena.innerHTML = tavernBG() +
    '<div class="wait-box"><div class="wait-title">友達を待っています…</div>'+
    '<div class="wait-code">部屋コード <b>'+myCode+'</b></div>'+
    '<div class="wait-hint">このコードを友達に伝えて、同じコードで入ってもらってね</div></div>';
  showTimer(false); el("banner").textContent="";
}
function showReadyScreen(){
  const arena=el("arena"); arena.className="arena stage";
  const youReady=S.you.ready, oppReady=S.opp && S.opp.ready;
  arena.innerHTML = tavernBG() +
    '<div class="ready-screen"><div class="rules-card">'+
      '<div class="rt">\u2694 ゲームルール \u2694</div>'+
      '<ul>'+
        '<li>じゃんけん5回勝負</li>'+
        '<li>最後に\u2605（星）が多いほうが勝ち</li>'+
        '<li>ノーマルで勝つと \u2605+1</li>'+
        '<li>\u2605の手でノーマルに勝つと +2</li>'+
        '<li>\u2605同士で勝つと +3</li>'+
        '<li>一度使った手は使えない</li>'+
      '</ul>'+
      '<div class="ready-row">'+
        '<span class="ready-badge '+(youReady?"ok":"wait")+'">あなた：'+(youReady?"準備OK!":"準備中")+'</span>'+
        '<span class="ready-badge '+(oppReady?"ok":"wait")+'">'+(S.opp?S.opp.name:"相手")+'：'+(oppReady?"準備OK!":"準備中")+'</span>'+
      '</div>'+
      (youReady ? '<div class="waiting-small">相手を待っています…</div>' : '<button class="btn primary" id="ready-btn">準備OK!!</button>')+
    '</div></div>';
  if(!youReady){ el("ready-btn").onclick=()=>send({t:"ready"}); }
  showTimer(false); el("banner").textContent="";
}

function onRoundStart(round, first){
  localPicked=false;
  const seq=[];
  if(first) seq.push({text:"ゲームスタート",cls:"start"});
  seq.push({text:(round>=5?"Final Round":"Round"+round),cls:"round"});
  showBanner(seq, ()=>{ idlePickStage(); renderTrays(); startPickTimer(); });
}
function idlePickStage(){
  const arena=el("arena"); arena.className="arena stage";
  arena.innerHTML = tavernBG() +
    fighterHTML("you","#2f6d86", S.you.name)+
    '<div class="verdict-slot"><div class="prompt">第'+S.round+'回戦<br>手を選ぼう</div></div>'+
    fighterHTML("opp","#a8496a", S.opp?S.opp.name:"相手");
}
function showBanner(seq, done){
  const arena=el("arena"); arena.className="arena stage"; let i=0;
  (function next(){
    if(i>=seq.length){ done&&done(); return; }
    arena.innerHTML = tavernBG()+'<div class="round-banner '+(seq[i].cls||"")+'">'+seq[i].text+'</div>';
    i++; setTimeout(next, 950);
  })();
}

function onPick(i){
  if(!S || S.phase!=="playing" || localPicked) return;
  localPicked=true; send({t:"pick", index:i}); renderTrays();
  const pr=document.querySelector(".prompt"); if(pr) pr.innerHTML="相手を待っています…";
}

/* ===== 手札・パネル ===== */
function renderTray(id, deck, isOpp){
  const tray=el(id); tray.innerHTML="";
  (deck||[]).forEach((c,i)=>{
    const d=document.createElement("div");
    d.className="card"+(isOpp?" cpu":"")+(c.used?" used":"");
    d.innerHTML=(c.star?'<span class="star">\u2605</span>':"")+
      '<span class="emoji">'+HANDS[c.type].emoji+'</span>'+
      '<span class="name">'+HANDS[c.type].name+'</span>';
    if(!isOpp && S.phase==="playing" && !localPicked && !c.used) d.onclick=()=>onPick(i);
    tray.appendChild(d);
  });
}
function renderTrays(){ if(!S) return; renderTray("you-tray", S.you.deck, false); renderTray("opp-tray", S.opp?S.opp.deck:[], true); }
function renderPanels(){
  if(!S) return;
  const y=S.you, o=S.opp;
  el("you-name").textContent=y.name;
  el("you-title").textContent=titleFor(y.strength,y.games);
  el("you-star").innerHTML=starIcons(y.star);
  el("you-rec").textContent=y.wins+"勝"+((o?o.wins:0))+"敗";
  el("you-str").textContent=y.strength;
  el("opp-name").textContent=o?o.name:"―";
  el("opp-title").textContent=o?titleFor(o.strength,o.games):"―";
  el("opp-star").innerHTML=o?starIcons(o.star):"";
  el("opp-rec").textContent=(o?o.wins:0)+"勝"+y.wins+"敗";
  el("opp-str").textContent=o?o.strength:"―";
}
function showDelta(id,d){ const e=el(id); if(!d){ e.textContent=""; return; } e.textContent=(d>0?"+":"")+d; e.className="delta "+(d>0?"up":"down"); }

/* ===== アバター・演出 ===== */
function pirateSVG(color){
  return '<svg class="pirate" viewBox="0 0 80 92" xmlns="http://www.w3.org/2000/svg">'+
    '<ellipse cx="40" cy="74" rx="21" ry="15" fill="#3a2c1e"/>'+
    '<rect x="30" y="58" width="20" height="16" rx="6" fill="#f0c9a0"/>'+
    '<circle cx="40" cy="42" r="18" fill="#f2cba2"/>'+
    '<path d="M21 36 Q40 20 59 36 L59 31 Q40 15 21 31 Z" fill="'+color+'"/>'+
    '<rect x="21" y="31" width="38" height="7" rx="3" fill="'+color+'"/>'+
    '<path d="M19 35 l-9 3 7 5 z" fill="'+color+'"/>'+
    '<circle cx="34" cy="44" r="2.6" fill="#2a2016"/>'+
    '<rect x="43" y="41" width="9" height="6" rx="2" fill="#241a10"/>'+
    '<line x1="47" y1="35" x2="53" y2="47" stroke="#241a10" stroke-width="1.6"/>'+
    '<path d="M34 52 Q40 56 46 52" stroke="#8a3b2b" stroke-width="2" fill="none" stroke-linecap="round"/>'+
    '</svg>';
}
function matSVG(){
  return '<svg class="mat" viewBox="0 0 90 30" xmlns="http://www.w3.org/2000/svg">'+
    '<ellipse cx="45" cy="15" rx="44" ry="14" fill="#7a2f22"/>'+
    '<ellipse cx="45" cy="15" rx="37" ry="11" fill="#9a3f2c"/>'+
    '<polygon points="45,3 47,15 45,27 43,15" fill="#eac079"/>'+
    '<polygon points="6,15 45,13 84,15 45,17" fill="#eac079"/>'+
    '<circle cx="45" cy="15" r="2.4" fill="#5e241a"/>'+
    '</svg>';
}
function barrelsRow(){
  let s=""; for(let x=4;x<300;x+=32){
    s+='<g transform="translate('+x+',12)"><rect x="0" y="0" width="24" height="30" rx="7" fill="#7c4c26" stroke="#4e2c14" stroke-width="1"/>'+
       '<rect x="-1" y="8" width="26" height="3" fill="#c98b3a"/><rect x="-1" y="20" width="26" height="3" fill="#c98b3a"/></g>';
  } return s;
}
function tavernBG(){
  return '<svg class="tavern-bg" viewBox="0 0 300 150" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">'+
    '<rect x="0" y="0" width="300" height="150" fill="#b98a52"/>'+
    '<rect x="0" y="0" width="300" height="50" fill="#3a2412"/>'+ barrelsRow()+
    '<rect x="0" y="48" width="300" height="4" fill="#5a3a1e"/>'+
    '<g stroke="#9c7038" stroke-width="1" opacity=".45"><line x1="150" y1="52" x2="10" y2="150"/><line x1="150" y1="52" x2="95" y2="150"/><line x1="150" y1="52" x2="205" y2="150"/><line x1="150" y1="52" x2="290" y2="150"/></g>'+
    '</svg>';
}
function fighterHTML(side,color,name){
  return '<div class="fighter '+side+'">'+
    '<div class="cap">'+name+'</div>'+
    '<div class="pick-card" id="'+side+'-pick"></div>'+
    '<div class="hand-anim" id="'+side+'-hand">\u270A</div>'+
    '<div class="avatar">'+pirateSVG(color)+'</div>'+ matSVG()+'</div>';
}
function setPick(id, card){
  const e=el(id); if(!e) return;
  e.innerHTML='<div class="box">'+(card.star?'<span class="st">\u2605</span>':"")+
    '<span class="e">'+HANDS[card.type].emoji+'</span><span class="n">'+HANDS[card.type].name+'</span></div>';
  e.classList.add("show");
}
function sparkle(container, hand){
  hand.classList.add("star-glow");
  const marks=["\u2728","\u2605","\u2727","\u2728","\u2605","\u2727"];
  for(let k=0;k<6;k++){ const s=document.createElement("span"); s.className="spark"; s.textContent=marks[k];
    s.style.left=(25+Math.random()*50)+"%"; s.style.top=(Math.random()*55)+"%"; s.style.animationDelay=(Math.random()*0.3)+"s"; container.appendChild(s); }
}
function confetti(container){
  const colors=["#f2c14e","#e0553b","#4f9d69","#3f7fbf","#ecc981","#e98cb0","#7fbf7f"];
  for(let i=0;i<40;i++){ const p=document.createElement("span"); p.className="confetti";
    p.style.left=Math.random()*100+"%"; p.style.background=colors[i%colors.length];
    p.style.animationDelay=(Math.random()*0.35)+"s"; p.style.animationDuration=(1.1+Math.random()*0.9)+"s";
    p.style.width=(5+Math.random()*5)+"px"; p.style.height=(8+Math.random()*6)+"px"; container.appendChild(p); }
  setTimeout(()=>{ container.querySelectorAll(".confetti").forEach(e=>e.remove()); },2800);
}
function animateRound(you, opp, result, done){
  const arena=el("arena"); arena.className="arena stage";
  arena.innerHTML = tavernBG()+
    fighterHTML("you","#2f6d86", S.you.name)+
    '<div class="verdict-slot" id="verdict-slot"></div>'+
    fighterHTML("opp","#a8496a", S.opp?S.opp.name:"相手");
  const yh=el("you-hand"), oh=el("opp-hand"), slot=el("verdict-slot");
  yh.classList.add("shaking"); oh.classList.add("shaking");
  let n=3; slot.innerHTML='<div class="count-num">'+n+'</div>';
  const cd=setInterval(()=>{
    n--;
    if(n>=1){ slot.innerHTML='<div class="count-num">'+n+'</div>'; }
    else{
      clearInterval(cd);
      yh.classList.remove("shaking"); oh.classList.remove("shaking");
      yh.textContent=HANDS[you.type].emoji; oh.textContent=HANDS[opp.type].emoji;
      yh.classList.add("pop"); oh.classList.add("pop");
      setPick("you-pick", you); setPick("opp-pick", opp);
      if(you.star) sparkle(yh.parentElement, yh);
      if(opp.star) sparkle(oh.parentElement, oh);
      const label=result==="win"?"勝ち！":result==="lose"?"負け…":"あいこ";
      slot.innerHTML='<div class="result-pop '+result+'">'+label+'</div>';
      if(result==="win") confetti(arena);
    }
  }, 500);
  setTimeout(done, 500*3+1500);
}

function onGameOver(m){
  stopPickTimer(); showTimer(false);
  const msg = m.result==="win" ? ("\u2693 星 "+m.yourStar+"\u2014"+m.oppStar+" であなたの勝利！")
            : m.result==="lose" ? ("\u2620 星 "+m.oppStar+"\u2014"+m.yourStar+" で相手の勝利…")
            : ("\uD83C\uDFF4 星 "+m.yourStar+"\u2014"+m.oppStar+" で引き分け");
  el("banner").textContent=msg;
  showDelta("you-delta", m.delta);
  el("actions").innerHTML='<button class="btn primary" id="rematch">もう一戦</button>';
  el("rematch").onclick=()=>{ send({t:"rematch"}); el("banner").textContent="相手のもう一戦を待っています…"; el("actions").innerHTML=""; };
  if(m.result==="win") confetti(el("arena"));
}
</script>
